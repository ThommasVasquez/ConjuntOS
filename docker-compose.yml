version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: enconjunto-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/enconjunto &&
        mc anonymous set download local/enconjunto &&
        echo 'Bucket enconjunto ready'
      "

  livekit:
    image: livekit/livekit-server:latest
    container_name: enconjunto-livekit
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"    # HTTP / WebSocket signaling
      - "7881:7881"    # RTC (WebRTC)
      - "7882:7882/udp" # RTC UDP
    environment:
      LIVEKIT_KEYS: "devkey: devsecret"

volumes:
  minio_data:
