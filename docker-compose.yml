version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: enconjunto-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: enconjunto
      POSTGRES_PASSWORD: enconjunto123
      POSTGRES_DB: enconjunto
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enconjunto -d enconjunto"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: enconjunto-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgresql://enconjunto:enconjunto123@db:5432/enconjunto
      RUN_MIGRATIONS: "true"
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-me}
      ALLOWED_ORIGINS: http://localhost:3000,https://conjuntos.app,https://www.conjuntos.app,https://app.conjuntos.app
      COOKIE_DOMAIN: .conjuntos.app
      TESTER_EMAILS: thommy@conjuntos.app,camilo@conjuntos.app,raul@conjuntos.app,paulo@conjuntos.app
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: enconjunto
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_PUBLIC_URL: https://storage.conjuntos.app/enconjunto
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
      LIVEKIT_URL: ${LIVEKIT_URL:-wss://livekit.conjuntos.app}
      # Web Push VAPID (despertador de la citofonía). Valores reales en el .env del
      # servidor (no se versionan); la clave pública también va a Cloudflare como
      # NEXT_PUBLIC_VAPID_PUBLIC_KEY.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:soporte@conjuntos.app}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: enconjunto-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/enconjunto &&
        mc anonymous set download local/enconjunto &&
        echo 'Bucket enconjunto ready'
      "

  livekit:
    image: livekit/livekit-server:latest
    container_name: enconjunto-livekit
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"    # HTTP / WebSocket signaling
      - "7881:7881"    # RTC (WebRTC)
      - "7882:7882/udp" # RTC UDP
    environment:
      LIVEKIT_KEYS: "devkey: devsecret"

volumes:
  pg_data:
  minio_data:
