# Local E2E override — makes the API testable from http://localhost.
#
# The base compose runs the API with production cookie settings
# (COOKIE_DOMAIN=.conjuntos.app, COOKIE_CROSS_SITE=true → SameSite=None; Secure;
# Domain=conjuntos.app). Browsers and curl REJECT that cookie on http://localhost,
# so UI e2e cannot authenticate locally. This override issues a host-only Lax
# cookie that works on localhost, and whitelists the demo admin as a tester so the
# RoleSwitcher can exercise all 13 roles.
#
# Use ONLY for local testing:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d --no-build backend
# Restore production-like local config:
#   docker compose -f docker-compose.yml up -d --no-build backend
services:
  backend:
    environment:
      COOKIE_DOMAIN: ""
      COOKIE_CROSS_SITE: "false"
      TESTER_EMAILS: admin@demo.conjuntos.app,thommy@conjuntos.app,camilo@conjuntos.app,raul@conjuntos.app,paulo@conjuntos.app
